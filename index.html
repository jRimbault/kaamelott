<!doctype html>
<html>

<head>
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta charset="utf-8">
  <meta name="description" content="Soundboard adapté de la série Kaamelott.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="Kaamelott le Soundboard" />
  <meta property="og:site_name" content="Kaamelott le Soundboard" />
  <meta name="og:description" content="Soundboard adapté de la série Kaamelott.">
  <meta property="og:locale:alternate" content="fr_FR" />
  <title>Kaamelott le Soundboard</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script type="module" src="/src/main.ts"></script>
</head>

<body class="page-content">
  <header class="page-title">
    <h1><img src="img/logo.jpg" alt="logo"></h1>
    <h1>Kaamelott le Soundboard</h1>
  </header>
  <div class="controls">
    <div id="filter">
      <div class="search-row">
        <input type="text" id="searchbox" placeholder="Ex. : Perceval" autocomplete="off" aria-label="Rechercher une réplique">
        <div class="menu-anchor">
          <button type="button" id="scope-toggle" class="btn icon-btn" aria-haspopup="true" aria-expanded="false" aria-controls="search-scopes" title="Rechercher dans : Tout" aria-label="Rechercher dans : Tout"><span class="icon icon-filter"></span></button>
          <div id="search-scopes" class="dropdown-menu" role="menu" aria-label="Restreindre la recherche à un champ" hidden>
            <button type="button" class="btn menu-item scope-btn is-active" role="menuitemradio" aria-checked="true" data-scope="" data-placeholder="Ex. : Perceval" title="Rechercher dans tous les champs">Tout</button>
            <button type="button" class="btn menu-item scope-btn" role="menuitemradio" aria-checked="false" data-scope="c" data-placeholder="Ex. : Perceval" title="Rechercher uniquement par personnage">Personnage</button>
            <button type="button" class="btn menu-item scope-btn" role="menuitemradio" aria-checked="false" data-scope="q" data-placeholder="Ex. : c'est pas faux" title="Rechercher uniquement dans les citations">Citation</button>
            <button type="button" class="btn menu-item scope-btn" role="menuitemradio" aria-checked="false" data-scope="t" data-placeholder="Ex. : Le Repas" title="Rechercher uniquement par titre d'épisode">Épisode</button>
            <button type="button" class="btn menu-item scope-btn" role="menuitemradio" aria-checked="false" data-scope="b" data-placeholder="Ex. : 3" title="Rechercher uniquement par numéro de livre">Livre</button>
          </div>
        </div>
        <div class="menu-anchor">
          <button type="button" id="group-toggle" class="btn icon-btn" aria-haspopup="true" aria-expanded="false" aria-controls="group-menu" title="Trier ou regrouper les répliques" aria-label="Trier ou regrouper les répliques"><span class="icon icon-sort"></span></button>
          <div id="group-menu" class="dropdown-menu" role="menu" aria-label="Trier ou regrouper les répliques" hidden>
            <button type="button" class="btn menu-item" id="character-filter" role="menuitem" title="Regrouper les répliques par personnage">Par personnage</button>
            <button type="button" class="btn menu-item" id="book-filter" role="menuitem" title="Regrouper les répliques par livre">Par livre</button>
            <button type="button" class="btn menu-item" id="reset-filter" role="menuitem" title="Réinitialiser : liste alphabétique complète">A - Z</button>
          </div>
        </div>
        <button type="button" id="clear-search" class="btn" aria-label="Effacer la recherche" title="Effacer la recherche" hidden>&times;</button>
      </div>
    </div>
    <p id="filter-status" aria-live="polite"></p>
  </div>
  <div id="list"></div>
</body>

</html>
